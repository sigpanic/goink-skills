name: Skill PR Check

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  issues: write

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: scripts/

      - name: Guard
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ACTION: ${{ github.event.action }}
          REPO: ${{ github.repository }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          # --- internal PR check ---
          HEAD_REPO_ID="${{ github.event.pull_request.head.repo.id }}"
          BASE_REPO_ID="${{ github.event.pull_request.base.repo.id }}"
          if [ "$HEAD_REPO_ID" = "$BASE_REPO_ID" ]; then
            echo "Internal PR — skipping skill guard"
            exit 0
          fi

          echo "Fork PR detected — checking file paths"

          # --- fetch changed files ---
          FILES=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json files --jq '.files[].path' 2>/dev/null || true)
          if [ -z "$FILES" ]; then
            echo "No files found — skipping check"
            exit 0
          fi

          # --- path guard: reject anything outside skills/ ---
          OUTSIDE=$(echo "$FILES" | grep -v '^skills/' || true)
          if [ -n "$OUTSIDE" ]; then
            echo "Files outside skills/ detected:"
            echo "$OUTSIDE"

            FILE_LIST=$(echo "$OUTSIDE" | sed 's/^/- `/' | sed 's/$/`/')

            if [ "$ACTION" = "opened" ] || [ "$ACTION" = "reopened" ]; then
              gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$(cat <<EOF
          ## 感谢你的 PR！ 🙏

          Goink 目前由单人维护，review 精力有限，核心代码暂不开放 PR，仅接受 \`skills/\` 目录下的技能贡献。你的 PR 包含以下不在 \`skills/\` 内的文件：

          ${FILE_LIST}

          欢迎关闭本 PR 后重新提交一个**仅包含 \`skills/\` 目录下文件**的 PR，会很乐意 review。参考 [贡献指南](https://github.com/${REPO}/blob/${DEFAULT_BRANCH}/README.md)。

          ---

          Thanks for the PR! Goink is maintained by a solo developer — core code is not open for PRs right now. Only skill contributions under the \`skills/\` directory are accepted. Feel free to open a new PR with only \`skills/\` changes and we'll happily review it. See [contributing guide](https://github.com/${REPO}/blob/${DEFAULT_BRANCH}/README_EN.md).
          EOF
              )"
            elif [ "$ACTION" = "synchronize" ]; then
              gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$(cat <<EOF
          ## 新提交引入了 \`skills/\` 之外的改动

          你的最新 commit 包含了以下不在 \`skills/\` 目录内的文件，PR 已被自动关闭：

          ${FILE_LIST}

          如需继续，请撤销这些改动后重新提交，或新建一个仅包含 \`skills/\` 文件的 PR。
          EOF
              )"
            fi

            gh pr close "$PR_NUMBER" --repo "$REPO"
            echo "PR closed — changes outside skills/ not allowed"
            exit 1
          fi

          # --- validate skill frontmatter ---
          echo "All changes are within skills/"
          SKILL_FILES=$(echo "$FILES" | grep '^skills/.*\.md$' || true)
          VALIDATION_ERRORS=""

          fetch_content() {
            gh api "repos/${REPO}/contents/${1}?ref=${HEAD_SHA}" --jq '.content' 2>/dev/null | base64 -d 2>/dev/null || true
          }

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            echo "Validating $file ..."
            expected=$(basename "$file" .md)
            content=$(fetch_content "$file")

            if [ -z "$content" ]; then
              VALIDATION_ERRORS="${VALIDATION_ERRORS}- \`${file}\`：无法读取文件内容"$'\n'
              continue
            fi

            if ! errs=$(printf '%s' "$content" | python3 scripts/validate-skill.py "$file" "$expected" 2>&1); then
              VALIDATION_ERRORS="${VALIDATION_ERRORS}${errs}"$'\n'
            fi
          done <<< "$SKILL_FILES"

          if [ -n "$VALIDATION_ERRORS" ]; then
            if [ "$ACTION" = "opened" ] || [ "$ACTION" = "reopened" ] || [ "$ACTION" = "synchronize" ]; then
              gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$(cat <<EOF
          ## 格式校验未通过

          请在本次 PR 中修改以下问题（不会关闭 PR）：

          ${VALIDATION_ERRORS}
          参考 [Skill 格式说明](https://github.com/${REPO}/blob/${DEFAULT_BRANCH}/README.md) 和 [模板](https://github.com/${REPO}/blob/${DEFAULT_BRANCH}/.template/skill.md)。

          ---

          Please fix the following issues in this PR (PR will not be closed):

          ${VALIDATION_ERRORS}
          See [format guide](https://github.com/${REPO}/blob/${DEFAULT_BRANCH}/README_EN.md) and [template](https://github.com/${REPO}/blob/${DEFAULT_BRANCH}/.template/skill.md).
          EOF
              )"
            fi
            echo "Frontmatter validation failed — PR left open, check marked as failed"
            exit 1
          fi

          echo "All skill files validated OK"

          # --- success ---
          if [ "$ACTION" = "opened" ]; then
            gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label 'skill-contribution' 2>/dev/null || true

            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$(cat <<EOF
          ## 感谢贡献！ 🎉

          已收到你的 skill PR，所有改动均在 \`skills/\` 目录内，维护者将尽快 review。如果有任何建议，会在 PR 中直接讨论。

          ---

          Thanks for the contribution! Your PR only touches files under \`skills/\` — looks great. Maintainers will review it soon. Feedback will be posted here if any.
          EOF
            )"
          fi
